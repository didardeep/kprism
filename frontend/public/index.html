<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPRISM Bot - PPT Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>KPRISM Bot</h2>
                <p>PPT Knowledge Assistant</p>
            </div>

            <div class="upload-section">
                <h3>Upload PPT</h3>
                <form id="uploadForm">
                    <label class="upload-area" id="uploadArea">
                        <input type="file" id="fileInput" accept=".pptx,.ppt" hidden>
                        <div class="upload-icon">&#128196;</div>
                        <span id="uploadLabel">Click to select a .pptx file</span>
                    </label>
                    <button type="submit" id="uploadBtn" disabled>Upload & Process</button>
                </form>
                <div id="uploadStatus" class="status-message"></div>
            </div>

            <div class="documents-section">
                <h3>Uploaded Documents</h3>
                <div id="documentsList" class="documents-list">
                    <p class="empty-state">No documents uploaded</p>
                </div>
            </div>
        </aside>

        <!-- Chat Area -->
        <main class="chat-area">
            <div class="chat-header">
                <h2>Chat with your Documents</h2>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="message bot-message">
                    <div class="message-content">
                        Hello! Upload a PPT file and ask me questions about its content. I'll only answer based on what's in the uploaded documents.
                    </div>
                </div>
            </div>

            <div class="chat-input-area">
                <form id="chatForm">
                    <input
                        type="text"
                        id="chatInput"
                        placeholder="Ask a question about your documents..."
                        autocomplete="off"
                    >
                    <button type="submit" id="sendBtn">Send</button>
                </form>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
